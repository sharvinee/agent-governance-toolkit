name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [agent-os, agent-mesh, agent-hypervisor, agent-sre, agent-compliance]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install --require-hashes --no-cache-dir -r requirements/ci-lint.txt
      - name: Lint ${{ matrix.package }}
        run: ruff check packages/${{ matrix.package }}/src/ --select E,F,W --ignore E501

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [agent-os, agent-mesh, agent-hypervisor, agent-sre, agent-compliance]
        python-version: ["3.11", "3.12"]
        include:
          - package: agent-os
            python-version: "3.10"
          - package: agent-sre
            python-version: "3.10"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: |
          pip install --no-cache-dir -e ".[dev]" 2>/dev/null || pip install --no-cache-dir -e ".[test]" 2>/dev/null || pip install --no-cache-dir -e .
          pip install --no-cache-dir --require-hashes \
            pytest==8.4.1 --hash=sha256:539c70ba6fcead8e78eebbf1115e8b589e7565830d7d006a8723f19ac8a0afb7 \
            pytest-asyncio==1.1.0 --hash=sha256:5fe2d69607b0bd75c656d1211f969cadba035030156745ee09e7d71740e58ecf \
            2>/dev/null || pip install --no-cache-dir pytest==8.4.1 pytest-asyncio==1.1.0 2>/dev/null || true
      - name: Test ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: pytest tests/ -q --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install safety
        run: |
          pip install --no-cache-dir --require-hashes \
            safety==3.2.1 --hash=sha256:9f53646717ba052e1bf631bd54fb3da0fafa58e85d578b20a8b9affdcf81889e \
            2>/dev/null || pip install --no-cache-dir safety==3.2.1
      - name: Check dependencies
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          for pkg in agent-os agent-mesh agent-hypervisor agent-sre agent-compliance; do
            echo "=== $pkg ==="
            cd packages/$pkg
            pip install --no-cache-dir -e . 2>/dev/null || true
            cd ../..
          done
          safety check 2>/dev/null || echo "Safety check completed with warnings"

  test-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"
      - name: Build .NET SDK
        working-directory: packages/agent-governance-dotnet
        run: dotnet build --configuration Release --verbosity quiet
      - name: Test .NET SDK
        working-directory: packages/agent-governance-dotnet
        run: dotnet test --configuration Release --verbosity normal --no-build
